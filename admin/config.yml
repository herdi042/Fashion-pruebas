backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"
locale: es

collections:

  # ── CURSOS ──
  - name: "cursos"
    label: "Cursos"
    label_singular: "Curso"
    folder: "data/cursos"
    create: true
    delete: true
    extension: "json"
    format: "json"
    identifier_field: "id"
    slug: "{{id}}"
    summary: "{{nombre}} — ${{precio}} MXN — {{nivel}}"
    fields:
      - { label: "ID único (nombre del archivo)", name: "id", widget: "string", hint: "Sin espacios ni acentos. Ej: costura-avanzada" }
      - { label: "Nombre del curso", name: "nombre", widget: "string" }
      - { label: "Precio (MXN)", name: "precio", widget: "number", value_type: "int", min: 0 }
      - { label: "Duración", name: "duracion", widget: "string", hint: "Ej: 8 semanas" }
      - { label: "Nivel", name: "nivel", widget: "select", options: ["Principiante", "Intermedio", "Avanzado"] }
      - { label: "Instructor", name: "instructor", widget: "string" }
      - { label: "Horario", name: "horario", widget: "string", hint: "Ej: Lunes y Miércoles · 18:00 – 21:00" }
      - { label: "Descripción", name: "descripcion", widget: "text" }
      - label: "¿Qué incluye?"
        name: "incluye"
        widget: "list"
        field: { label: "Item", name: "item", widget: "string" }
      - label: "Objetivos de aprendizaje"
        name: "objetivos"
        widget: "list"
        field: { label: "Objetivo", name: "objetivo", widget: "string" }
      - { label: "Imagen del curso (URL)", name: "imagen", widget: "string", required: false }
      - { label: "Curso activo en la web", name: "activo", widget: "boolean", default: true, hint: "Desactivar para ocultar sin borrar" }

  # ── CONTENIDO DEL SITIO ──
  - name: "site"
    label: "Contenido del Sitio"
    files:

      - label: "Configuración General"
        name: "general"
        file: "data/site/general.json"
        fields:

          - label: "Hero — Slides del carrusel"
            name: "hero"
            widget: "object"
            fields:
              - label: "Slides"
                name: "slides"
                widget: "list"
                max: 6
                summary: "{{fields.titulo_rojo}} {{fields.titulo_blanco}}"
                fields:
                  - { label: "Título en rojo", name: "titulo_rojo", widget: "string", hint: "Ej: AI" }
                  - { label: "Título en blanco", name: "titulo_blanco", widget: "string", hint: "Ej: EN LA MODA" }
                  - { label: "Descripción", name: "descripcion", widget: "string" }

          - label: "Textos generales"
            name: "general"
            widget: "object"
            fields:
              - { label: "Título '¿Qué es FIMx?'", name: "que_es_titulo", widget: "string" }
              - { label: "Subtítulo '¿Qué es FIMx?'", name: "que_es_subtitulo", widget: "string" }
              - { label: "Descripción '¿Qué es FIMx?'", name: "que_es_descripcion", widget: "text" }
              - { label: "Descripción 'No somos una escuela tradicional'", name: "escuela_descripcion", widget: "text" }
              - { label: "Título CTA final", name: "cta_titulo", widget: "string" }
              - { label: "Subtítulo CTA final", name: "cta_subtitulo", widget: "string" }

          - label: "Contacto"
            name: "contacto"
            widget: "object"
            fields:
              - { label: "Teléfono (con formato)", name: "telefono", widget: "string", hint: "Ej: +52 81 15 39 73 80" }
              - { label: "WhatsApp (solo números)", name: "whatsapp", widget: "string", hint: "Ej: 528115397380" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Instagram", name: "instagram", widget: "string" }
              - { label: "Ciudad", name: "ciudad", widget: "string" }

          - label: "Pagos y Mercado Pago"
            name: "pagos"
            widget: "object"
            fields:
              - { label: "Link de Mercado Pago", name: "mercadopago_link", widget: "string", hint: "Link de pago de Mercado Pago. Ej: https://mpago.la/XXXXXXX" }
              - { label: "WhatsApp para pago (solo números)", name: "whatsapp_pago", widget: "string" }
              - { label: "Texto del disclaimer de pago", name: "disclaimer_pago", widget: "text", hint: "Aparece en la página de pago" }
